version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://vriksh:logix@db:5432/vrikshlogix
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super-secret-salt-123}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db

  db:
    image: postgis/postgis:15-3.3-alpine
    restart: always
    environment:
      - POSTGRES_USER=vriksh
      - POSTGRES_PASSWORD=logix
      - POSTGRES_DB=vrikshlogix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
